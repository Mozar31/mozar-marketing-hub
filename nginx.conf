server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # O Next exporta com trailingSlash: /ferramentas/roi/ → /ferramentas/roi/index.html
    location / {
        try_files $uri $uri/ $uri/index.html /404.html;
    }

    # Assets com hash no nome podem ser cacheados agressivamente
    location /_next/static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # HTML sempre revalidado para o deploy aparecer na hora
    location ~* \.html$ {
        add_header Cache-Control "no-cache";
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 1024;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    error_page 404 /404.html;
}
